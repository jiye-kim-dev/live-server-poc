version: "3.9"

networks:
  live-net:
    driver: bridge

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: live-config
    restart: unless-stopped
    networks:
      - live-net
    ports:
      - "1935:1935"     # RTMP
      - "8888:8888"     # HLS
      - "8889:8889"     # WebRTC
      - "8890:8890/udp" # SRT
      - "9997:9997"     # Control API
      - "9998:9998"     # Metrics
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml
    environment:
      - MTX_LOGLEVEL=info
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9997/v3/paths/list" ]
      interval: 10s
      timeout: 5s
      retries: 3

  go-server:
    build: .
    container_name: live-go-server
    restart: unless-stopped
    networks:
      - live-net
    ports:
      - "8085:8085"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"